name: Engineering Task
description: Create a technical task, refactor, cleanup or maintenance ticket
title: "[Task]: "
labels: ["type: task"]
body:
  - type: textarea
    id: goal
    attributes:
      label: Goal
      description: What should this task achieve?
      placeholder: "Example: Clean up unused API routes."
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Context
      description: Why is this task needed?
      placeholder: "Explain the technical reason, risk or dependency."
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: What is included in this task?
      value: |
        Included:
        - 

        Not included:
        - 
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - P0 - Urgent / production blocking
        - P1 - High
        - P2 - Normal
        - P3 - Low
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Frontend
        - Backend
        - Mobile
        - Infrastructure
        - QA
        - Product
    validations:
      required: true

  - type: textarea
    id: test_criteria
    attributes:
      label: Test Criteria
      value: |
        - [ ] Relevant existing functionality still works
        - [ ] No existing tests are broken
        - [ ] No console or server log errors
        - [ ] Risky changes have been reviewed
    validations:
      required: true

  - type: textarea
    id: definition_of_done
    attributes:
      label: Definition of Done
      value: |
        - [ ] Code merged
        - [ ] PR reviewed
        - [ ] Test criteria completed
        - [ ] No blocker / critical bugs open
        - [ ] Documentation updated where relevant
    validations:
      required: true
